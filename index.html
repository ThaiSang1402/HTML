<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Bán Hàng Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            background: #2c3e50;
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .cart-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-count {
            background: #e74c3c;
            border-radius: 50%;
            padding: 5px 10px;
            font-size: 0.8rem;
        }

        /* Main Content */
        main {
            margin-top: 80px;
            padding: 2rem 0;
        }

        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 4rem 0;
            margin-bottom: 3rem;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1.2rem;
        }

        /* Products */
        .products-section {
            margin-bottom: 3rem;
        }

        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #2c3e50;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .product-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #6c757d;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .product-price {
            font-size: 1.5rem;
            color: #e74c3c;
            font-weight: bold;
            margin-bottom: 1rem;
        }

        .product-description {
            color: #666;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            background: #3498db;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .add-to-cart:hover {
            background: #2980b9;
        }

        /* Cart */
        .cart-section {
            background: #f8f9fa;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        .cart-items {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-info {
            flex: 1;
        }

        .item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            background: #3498db;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
        }

        .quantity {
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
        }

        .cart-total {
            text-align: right;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 1rem;
        }

        .checkout-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 1.2rem;
            cursor: pointer;
            float: right;
            margin-top: 1rem;
        }

        .checkout-btn:hover {
            background: #229954;
        }

        .empty-cart {
            text-align: center;
            color: #666;
            font-style: italic;
        }

        /* Footer */
        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 2rem 0;
            margin-top: 3rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }
            
            .products-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">🛒 Shop Online</div>
                <div class="cart-info">
                    <span>Giỏ hàng:</span>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>Chào mừng đến với Shop Online</h1>
                <p>Khám phá những sản phẩm chất lượng với giá tốt nhất</p>
            </div>
        </section>

        <section class="products-section">
            <div class="container">
                <h2 class="section-title">Sản phẩm nổi bật</h2>
                <div class="products-grid" id="productsGrid">
                    <!-- Products will be loaded here by JavaScript -->
                </div>
            </div>
        </section>

        <section class="cart-section">
            <div class="container">
                <h2 class="section-title">Giỏ hàng của bạn</h2>
                <div class="cart-items">
                    <div id="cartItems">
                        <div class="empty-cart">Giỏ hàng trống</div>
                    </div>
                    <div class="cart-total" id="cartTotal" style="display: none;">
                        Tổng cộng: <span id="totalAmount">0</span>đ
                    </div>
                    <button class="checkout-btn" id="checkoutBtn" style="display: none;">
                        Thanh toán
                    </button>
                    <div style="clear: both;"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Shop Online. Tất cả quyền được bảo lưu.</p>
        </div>
    </footer>

    <script>
        // Sample products data
        const products = [
            {
                id: 1,
                name: "Áo thun nam",
                price: 299000,
                description: "Áo thun cotton 100% chất lượng cao, thoáng mát",
                image: "👕"
            },
            {
                id: 2,
                name: "Quần jeans nữ",
                price: 599000,
                description: "Quần jeans skinny fit, phong cách trẻ trung",
                image: "👖"
            },
            {
                id: 3,
                name: "Giày sneaker",
                price: 899000,
                description: "Giày thể thao thời trang, êm chân",
                image: "👟"
            },
            {
                id: 4,
                name: "Túi xách nữ",
                price: 450000,
                description: "Túi xách da PU cao cấp, nhiều ngăn tiện lợi",
                image: "👜"
            },
            {
                id: 5,
                name: "Đồng hồ nam",
                price: 1200000,
                description: "Đồng hồ thời trang, chống nước",
                image: "⌚"
            },
            {
                id: 6,
                name: "Kính mát",
                price: 350000,
                description: "Kính mát chống UV, thiết kế hiện đại",
                image: "🕶️"
            }
        ];

        // Cart array to store items
        let cart = [];

        // Format currency
        function formatCurrency(amount) {
            return amount.toLocaleString('vi-VN');
        }

        // Render products
        function renderProducts() {
            const productsGrid = document.getElementById('productsGrid');
            productsGrid.innerHTML = products.map(product => `
                <div class="product-card">
                    <div class="product-image">${product.image}</div>
                    <div class="product-info">
                        <div class="product-name">${product.name}</div>
                        <div class="product-price">${formatCurrency(product.price)}đ</div>
                        <div class="product-description">${product.description}</div>
                        <button class="add-to-cart" onclick="addToCart(${product.id})">
                            Thêm vào giỏ hàng
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Add item to cart
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({
                    ...product,
                    quantity: 1
                });
            }

            updateCartDisplay();
            updateCartCount();
        }

        // Remove item from cart
        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartDisplay();
            updateCartCount();
        }

        // Update item quantity
        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartDisplay();
                    updateCartCount();
                }
            }
        }

        // Update cart count in header
        function updateCartCount() {
            const cartCount = document.getElementById('cartCount');
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;
        }

        // Update cart display
        function updateCartDisplay() {
            const cartItems = document.getElementById('cartItems');
            const cartTotal = document.getElementById('cartTotal');
            const totalAmount = document.getElementById('totalAmount');
            const checkoutBtn = document.getElementById('checkoutBtn');

            if (cart.length === 0) {
                cartItems.innerHTML = '<div class="empty-cart">Giỏ hàng trống</div>';
                cartTotal.style.display = 'none';
                checkoutBtn.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="item-info">
                            <strong>${item.name}</strong><br>
                            <span>${formatCurrency(item.price)}đ</span>
                        </div>
                        <div class="item-controls">
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span class="quantity">${item.quantity}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${item.id}, 1)">+</button>
                            <button class="remove-btn" onclick="removeFromCart(${item.id})">Xóa</button>
                        </div>
                    </div>
                `).join('');

                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                totalAmount.textContent = formatCurrency(total);
                cartTotal.style.display = 'block';
                checkoutBtn.style.display = 'block';
            }
        }

        // Checkout function
        function checkout() {
            if (cart.length === 0) {
                alert('Giỏ hàng trống!');
                return;
            }

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const itemsList = cart.map(item => `${item.name} x${item.quantity}`).join('\n');
            
            alert(`Cảm ơn bạn đã mua hàng!\n\nSản phẩm:\n${itemsList}\n\nTổng cộng: ${formatCurrency(total)}đ`);
            
            // Clear cart after checkout
            cart = [];
            updateCartDisplay();
            updateCartCount();
        }

        // Add checkout event listener
        document.getElementById('checkoutBtn').addEventListener('click', checkout);

        // Initialize the page
        document.addEventListener('DOMContentLoaded', function() {
            renderProducts();
            updateCartDisplay();
            updateCartCount();
        });
    </script>
</body>
</html>
